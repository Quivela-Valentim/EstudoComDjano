{% extends "estudo_Djangos/base.html" %}

{% load bootstrap3 %}

{% block header  %}
     <h2> Tópicos <h2>
{% endblock header %}

{% block content %}
   
   <ul>
        {% for topic in topics %}
           <li>
              <h3>
                 <a href="{% url 'topic' topic.id %}">{{topic}}</a>
              </h3>
               
           </li>
        {%empty%}
             <li>Não há lista<li>
        {% endfor %}
   </ul>

    <h3> <a href="{% url 'new_topic' %}">Adicionar novos tópicos</a> <h3>

{% endblock content %}
